bio: |
  Zhonghai Lu is a Professor in the Thrust of Microelectronics at The Hong Kong University of Science and Technology (Guangzhou). His research spans Network-on-Chip and System-on-Chip, computing system architecture, embedded machine learning and AI accelerators, chiplet networks, and prognostics and health management of electronic chips and systems.
