<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="{{ .Params.summary | default .Site.Params.hugoblox.identity.description }}">
  <title>{{ .Title }} · Zhonghai Lu’s Lab</title>
  <link rel="stylesheet" href="{{ "css/lab.css" | relURL }}"><script defer src="{{ "js/lab.js" | relURL }}"></script>
</head>
<body class="inner-page">
  {{ $zh := eq .Site.Language.Lang "zh" }}
  <header class="site-header is-scrolled"><div class="nav-shell"><a class="brand" href="{{ .Site.Home.RelPermalink }}"><span class="brand-mark"><i></i><i></i><i></i></span><span class="brand-copy"><strong>Zhonghai Lu’s Lab</strong><small>{{ if $zh }}鲁中海教授研究组{{ else }}Integrated Systems Research{{ end }}</small></span></a><nav class="inner-nav"><a href="{{ .Site.Home.RelPermalink }}#research">Research</a><a href="{{ .Site.Home.RelPermalink }}#team">Team</a><a href="{{ .Site.Home.RelPermalink }}#publications">Publications</a>{{ if $zh }}<a class="language-link" href="/">中文</a>{{ else }}<a class="language-link" href="/zh/">EN</a>{{ end }}</nav></div></header>
  <main class="inner-main">{{ block "main" . }}{{ end }}</main>
  <footer class="inner-footer"><div class="shell"><strong>Zhonghai Lu’s Lab</strong><a href="{{ .Site.Home.RelPermalink }}">{{ if $zh }}返回首页{{ else }}Back to homepage{{ end }} →</a></div></footer>
</body>
</html>
